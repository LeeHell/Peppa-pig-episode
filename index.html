<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peppa Pig – Season 1 Episodes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Nunito+Sans:wght@400;600&display=swap');

  :root {
    --pink:    #F45B8B;
    --pink-lt: #FCE4EE;
    --pink-dk: #C73D6D;
    --red:     #E8384F;
    --yellow:  #FFD166;
    --sky:     #A8DEFF;
    --sky-dk:  #5EB9F0;
    --bg:      #FFF7FA;
    --card-bg: #FFFFFF;
    --text:    #2D1B24;
    --muted:   #9A7285;
    --radius:  16px;
    --shadow:  0 4px 20px rgba(244,91,139,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--pink);
    padding: 28px 24px 0;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 32px;
    background: var(--bg);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .header-inner {
    position: relative;
    z-index: 1;
  }
  .logo-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.22);
    border-radius: 999px;
    padding: 8px 20px;
    margin-bottom: 16px;
  }
  .logo-pig {
    font-size: 28px;
  }
  .logo-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    color: #fff;
    letter-spacing: 0.04em;
  }
  header h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: #fff;
    line-height: 1.15;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  header p {
    color: rgba(255,255,255,0.85);
    font-size: 0.95rem;
    margin-bottom: 36px;
  }

  /* ── TABS ── */
  .tabs-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 0 16px 24px;
  }
  .tab-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    background: rgba(255,255,255,0.25);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 999px;
    padding: 8px 18px;
    cursor: pointer;
    transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.12s;
    white-space: nowrap;
  }
  .tab-btn:hover {
    background: rgba(255,255,255,0.4);
    transform: translateY(-1px);
  }
  .tab-btn.active {
    background: #fff;
    color: var(--pink-dk);
    border-color: #fff;
  }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .dvd-panel { display: none; }
  .dvd-panel.active { display: block; }

  .dvd-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .dvd-disc {
    width: 44px; height: 44px;
    background: conic-gradient(from 0deg, var(--pink), var(--yellow), var(--sky), var(--pink));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(244,91,139,0.3);
    flex-shrink: 0;
  }
  .dvd-disc::after {
    content: '';
    width: 14px; height: 14px;
    background: var(--bg);
    border-radius: 50%;
  }
  .dvd-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.15rem;
    color: var(--pink-dk);
  }
  .dvd-range {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── GRID ── */
  .episodes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .ep-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    border: 2px solid transparent;
  }
  .ep-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 32px rgba(244,91,139,0.2);
    border-color: var(--pink);
  }

  /* thumbnail zone */
  .ep-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--pink-lt);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .ep-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .ep-thumb .thumb-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--pink);
    opacity: 0.6;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .ep-thumb .thumb-placeholder svg {
    width: 36px; height: 36px;
  }

  /* episode number badge */
  .ep-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--pink);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }

  /* play button overlay */
  .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(244,91,139,0);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s;
  }
  .ep-card:hover .play-overlay {
    background: rgba(244,91,139,0.18);
  }
  .play-btn {
    width: 42px; height: 42px;
    background: var(--pink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(244,91,139,0.5);
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.18s, transform 0.18s;
  }
  .ep-card:hover .play-btn {
    opacity: 1;
    transform: scale(1);
  }
  .play-btn svg {
    width: 16px; height: 16px;
    fill: #fff;
    margin-left: 2px;
  }

  /* card body */
  .ep-body {
    padding: 12px 14px 14px;
  }
  .ep-num {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 3px;
    letter-spacing: 0.04em;
  }
  .ep-title-en {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.92rem;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 2px;
  }
  .ep-title-ko {
    font-size: 0.78rem;
    color: var(--muted);
  }

  /* ── MODAL / VIDEO PAGE ── */
  .video-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,8,18,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    padding: 20px;
  }
  .video-overlay.open {
    display: flex;
  }
  .video-modal {
    background: #fff;
    border-radius: 20px;
    width: 100%;
    max-width: 780px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    position: relative;
    animation: popIn 0.22s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.88); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .modal-close {
    position: absolute;
    top: 12px; right: 14px;
    width: 36px; height: 36px;
    background: var(--pink);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: background 0.15s, transform 0.12s;
  }
  .modal-close:hover { background: var(--pink-dk); transform: scale(1.08); }
  .modal-close svg { width: 16px; height: 16px; stroke: #fff; stroke-width: 2.5; }

  .modal-video {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    border: none;
  }
  .modal-info {
    padding: 16px 20px 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .modal-pig { font-size: 2rem; line-height: 1; }
  .modal-meta {}
  .modal-ep-num {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .modal-title-en {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.15rem;
    color: var(--text);
    line-height: 1.25;
    margin: 2px 0;
  }
  .modal-title-ko {
    font-size: 0.88rem;
    color: var(--muted);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 500px) {
    .episodes-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    main { padding: 20px 12px 40px; }
  }
</style>
</head>

        <div class="ep-num">에피소드 ${ep.ep}</div>
        <div class="ep-title-en">${ep.en}</div>
        <div class="ep-title-ko">${ep.ko}</div>
      </div>
    `;

    grid.appendChild(card);
  });
}

// Tab switching
function showDVD(num, btn) {
  document.querySelectorAll('.dvd-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('dvd-' + num).classList.add('active');
  btn.classList.add('active');
}

// Video modal
function openVideo(ep) {
  const overlay = document.getElementById('videoOverlay');
  const iframe  = document.getElementById('modalIframe');

  document.getElementById('modalEpNum').textContent   = `Season 1 · Episode ${ep.ep}`;
  document.getElementById('modalTitleEn').textContent = ep.en;
  document.getElementById('modalTitleKo').textContent = ep.ko;

  // Use youtube embed (nocookie for privacy)
  iframe.src = `https://www.youtube-nocookie.com/embed/${ep.yt}?autoplay=1&rel=0`;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeVideo() {
  const overlay = document.getElementById('videoOverlay');
  const iframe  = document.getElementById('modalIframe');
  overlay.classList.remove('open');
  iframe.src = '';
  document.body.style.overflow = '';
}

// Close on overlay click (outside modal)
function handleOverlayClick(e) {
  if (e.target === document.getElementById('videoOverlay')) closeVideo();
}

// Close on Escape key
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideo(); });

buildGrids();
</script>
</body>
</html>
